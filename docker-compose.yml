services:
  db:
    image: postgres:16
    container_name: riot_database
    restart: always
    environment:
      POSTGRES_USER: ${USER_DB}
      POSTGRES_PASSWORD: ${PASSWORD_DB}
      POSTGRES_DB: riot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: riot_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      USER_DB: ${USER_DB}
      PASSWORD_DB: ${PASSWORD_DB}
      POSTGRES_DB: riot_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - .:/app

volumes:
  postgres_data: